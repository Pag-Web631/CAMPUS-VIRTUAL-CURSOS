<header>
    <h2>Campus Virtual UTECO</h2>
    <p id="nombreUsuario">Bienvenido</p>

    <nav class="menu">
        <a href="index.html" class="active">🏠 Inicio</a>
        <a href="cursos.html">📚 Cursos</a>
        <a href="perfil.html">👤 Área personal</a>
        <a href="eventos.html">📅 Eventos</a>

        <input id="nombre" placeholder="Tu nombre" style="padding:5px;">
        <button onclick="guardarUser('estudiante')">👨‍🎓 Estudiante</button>
        <button onclick="guardarUser('docente')">👨‍🏫 Docente</button>
    </nav>
</header>

<style>
header {
    background: url('https://img.freepik.com/vector-gratis/blue-abstract-shapes-with-transparent-background_1035-7118.jpg') center/cover no-repeat;
    color: white;
    padding: 20px;
    text-align: center;
    position: relative;
}
header::before {
    content: "";
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    z-index:0;
}
header h2, header p, nav.menu { position: relative; z-index: 1; margin: 5px 0; }
nav.menu { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:10px; }
nav.menu a, nav.menu button { text-decoration:none; padding:6px 12px; border-radius:5px; color:white; background: rgba(26,115,232,0.7); border:none; cursor:pointer; font-size:14px; transition:0.3s; }
nav.menu a:hover, nav.menu button:hover, nav.menu a.active { background:#1a73e8; }
</style>

<script>
function guardarUser(rol){
    let nombre = document.getElementById("nombre").value;
    if(!nombre) return alert("Ingresa tu nombre");
    let user = {nombre, rol};
    localStorage.setItem("user", JSON.stringify(user));
    document.getElementById("nombreUsuario").innerText = `Bienvenido ${nombre} (${rol})`;
    if(rol==="estudiante") window.location = "estudiante.html";
    else if(rol==="docente") window.location = "docente.html";
}
let user = JSON.parse(localStorage.getItem("user")) || {nombre:"", rol:""};
if(user.nombre) document.getElementById("nombreUsuario").innerText = `Bienvenido ${user.nombre} (${user.rol})`;
</script>
