<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual UTECO</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#f4f6f8; }
header {
    background: linear-gradient(135deg,#1a73e8,#4a90e2);
    color:white;
    padding:15px;
    position: sticky;
    top:0;
}
header h2 { margin:0; }
header p { margin:5px 0; }
header button { margin-right:5px; padding:5px 10px; border:none; border-radius:5px; cursor:pointer; }
.main { padding:20px; }
</style>
</head>
<body>

<header>
    <h2>Campus Virtual UTECO</h2>
    <p id="bienvenida">Bienvenido</p>
    <input id="nombre" placeholder="Tu nombre" style="padding:5px;">
    <button onclick="login('estudiante')">👨‍🎓 Estudiante</button>
    <button onclick="login('docente')">👨‍🏫 Docente</button>
</header>

<div class="main" id="panel">
    <p>Panel de acceso, selecciona tu rol arriba.</p>
</div>

<script>
function login(rol){
    let nombre = document.getElementById("nombre").value.trim();
    if(!nombre) return alert("Ingresa tu nombre");
    localStorage.setItem("user", JSON.stringify({nombre, rol}));
    actualizarHeader();
    renderPanel();
}

function actualizarHeader(){
    let user = JSON.parse(localStorage.getItem("user"));
    if(user){
        document.getElementById("bienvenida").innerText = `Bienvenido ${user.nombre} (${user.rol === 'estudiante' ? 'Estudiante' : 'Docente'})`;
    }
}

function renderPanel(){
    let user = JSON.parse(localStorage.getItem("user"));
    let panel = document.getElementById("panel");
    if(!user){ 
        panel.innerHTML = "<p>Panel de acceso, selecciona tu rol arriba.</p>"; 
        return;
    }
    if(user.rol === "estudiante"){
        panel.innerHTML = "<h3>Panel Estudiante</h3><p>Ver cursos, ver tareas y enviar entregas.</p>";
    } else {
        panel.innerHTML = "<h3>Panel Docente</h3><p>Crear cursos, crear tareas, ver entregas y calificar.</p>";
    }
}

// Cargar si ya hay usuario guardado
actualizarHeader();
renderPanel();
</script>

</body>
</html>
