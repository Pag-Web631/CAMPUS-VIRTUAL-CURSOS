<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual Pro</title>
<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#1a73e8; color:white; padding:15px; text-align:center; }
nav { display:flex; gap:10px; justify-content:center; background:#fff; padding:10px; }
nav button { padding:10px; border:none; cursor:pointer; background:#eee; }
section { display:none; padding:20px; }
.active { display:block; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
input, textarea, select { width:100%; padding:8px; margin:5px 0; }
button.primary { background:#1a73e8; color:white; }
</style>
</head>
<body>

<header>
<h1>🎓 Campus Virtual Pro</h1>
</header>

<section id="login" class="active">
<h2>Iniciar Sesión</h2>
<select id="rol">
<option value="docente">Docente</option>
<option value="estudiante">Estudiante</option>
</select>
<input id="usuario" placeholder="Nombre">
<button class="primary" onclick="login()">Entrar</button>
</section>

<nav id="menu" style="display:none">
<button onclick="mostrar('cursos')">Cursos</button>
<button onclick="mostrar('crear')" id="btnCrear">Crear Curso</button>
<button onclick="mostrar('tareas')">Tareas</button>
<button onclick="logout()">Salir</button>
</nav>

<section id="cursos">
<h2>Mis Cursos</h2>
<div id="listaCursos"></div>
</section>

<section id="crear">
<h2>Crear Curso (Solo Docente)</h2>
<input id="nombreCurso" placeholder="Nombre del curso">
<textarea id="descCurso" placeholder="Descripción"></textarea>
<button class="primary" onclick="crearCurso()">Guardar</button>
</section>

<section id="tareas">
<h2>Tareas</h2>
<input id="nombreTarea" placeholder="Nombre tarea">
<button onclick="agregarTarea()">Agregar</button>
<ul id="listaTareas"></ul>
</section>

<script>
let usuarioActual = JSON.parse(localStorage.getItem('usuarioActual')) || null;
let cursos = JSON.parse(localStorage.getItem('cursos')) || [];
let tareas = JSON.parse(localStorage.getItem('tareas')) || [];

function login(){
 let rol = document.getElementById('rol').value;
 let nombre = document.getElementById('usuario').value;
 if(!nombre) return alert('Escribe tu nombre');
 usuarioActual = {rol, nombre};
 localStorage.setItem('usuarioActual', JSON.stringify(usuarioActual));
 iniciarApp();
}

function iniciarApp(){
 document.getElementById('login').style.display='none';
 document.getElementById('menu').style.display='flex';
 mostrar('cursos');

 if(usuarioActual.rol === 'estudiante'){
 document.getElementById('btnCrear').style.display='none';
 } else {
 document.getElementById('btnCrear').style.display='inline-block';
 }

 mostrarCursos();
 mostrarTareas();
}

function logout(){
 localStorage.removeItem('usuarioActual');
 location.reload();
}

function mostrar(id){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function crearCurso(){
 if(usuarioActual.rol !== 'docente') return alert('Solo el docente puede crear');
 let nombre = document.getElementById('nombreCurso').value;
 let desc = document.getElementById('descCurso').value;
 if(!nombre) return alert('Escribe un nombre');
 cursos.push({nombre, desc});
 localStorage.setItem('cursos', JSON.stringify(cursos));
 mostrarCursos();
}

function mostrarCursos(){
 let cont = document.getElementById('listaCursos');
 cont.innerHTML='';
 cursos.forEach(c=>{
 cont.innerHTML += `<div class="card"><h3>${c.nombre}</h3><p>${c.desc}</p></div>`;
 });
}

function agregarTarea(){
 let t = document.getElementById('nombreTarea').value;
 if(!t) return;
 tareas.push(t);
 localStorage.setItem('tareas', JSON.stringify(tareas));
 mostrarTareas();
}

function mostrarTareas(){
 let ul = document.getElementById('listaTareas');
 ul.innerHTML='';
 tareas.forEach(t=>{
 ul.innerHTML += `<li>${t}</li>`;
 });
}

if(usuarioActual) iniciarApp();
</script>

</body>
</html>
