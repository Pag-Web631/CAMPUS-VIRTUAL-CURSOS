<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual PRO MAX</title>
<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#1a73e8; color:white; padding:15px; text-align:center; }
nav { display:flex; gap:10px; justify-content:center; background:#fff; padding:10px; flex-wrap:wrap; }
nav button { padding:10px; border:none; cursor:pointer; background:#eee; }
section { display:none; padding:20px; }
.active { display:block; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
input, textarea, select { width:100%; padding:8px; margin:5px 0; }
button.primary { background:#1a73e8; color:white; }
</style>
</head>
<body>

<header>
<h1>🚀 Campus Virtual PRO MAX</h1>
</header>

<section id="login" class="active">
<h2>Login</h2>
<select id="rol">
<option value="docente">Docente</option>
<option value="estudiante">Estudiante</option>
</select>
<input id="usuario" placeholder="Nombre">
<button onclick="login()">Entrar</button>
</section>

<nav id="menu" style="display:none">
<button onclick="mostrar('cursos')">Cursos</button>
<button onclick="mostrar('crear')" id="btnCrear">Crear</button>
<button onclick="mostrar('tareas')">Tareas</button>
<button onclick="mostrar('examenes')">Exámenes</button>
<button onclick="mostrar('entregas')">Entregas</button>
<button onclick="logout()">Salir</button>
</nav>

<section id="crear">
<h2>Crear (Docente)</h2>
<select id="tipo">
<option value="curso">Curso</option>
<option value="tarea">Tarea</option>
<option value="examen">Examen</option>
</select>
<input id="titulo" placeholder="Título">
<textarea id="desc" placeholder="Descripción / preguntas"></textarea>
<input type="date" id="fecha">
<button onclick="crear()">Guardar</button>
</section>

<section id="cursos"><h2>Cursos</h2><div id="listaCursos"></div></section>
<section id="tareas"><h2>Tareas</h2><div id="listaTareas"></div></section>
<section id="examenes"><h2>Exámenes</h2><div id="listaExamenes"></div></section>
<section id="entregas"><h2>Entregas (Docente)</h2><div id="listaEntregas"></div></section>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let cursos = JSON.parse(localStorage.getItem('cursos'))||[];
let tareas = JSON.parse(localStorage.getItem('tareas'))||[];
let examenes = JSON.parse(localStorage.getItem('examenes'))||[];
let entregas = JSON.parse(localStorage.getItem('entregas'))||[];

function login(){
 let rol = document.getElementById('rol').value;
 let nombre = document.getElementById('usuario').value;
 if(!nombre) return alert('Escribe nombre');
 user={rol,nombre};
 localStorage.setItem('user',JSON.stringify(user));
 iniciar();
}

function iniciar(){
 document.getElementById('login').style.display='none';
 document.getElementById('menu').style.display='flex';
 if(user.rol==='estudiante') document.getElementById('btnCrear').style.display='none';
 mostrar('cursos');
 render();
}

function logout(){localStorage.clear();location.reload();}

function mostrar(id){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function crear(){
 if(user.rol!=='docente') return alert('Solo docente');
 let tipo=document.getElementById('tipo').value;
 let t=document.getElementById('titulo').value;
 let d=document.getElementById('desc').value;
 let f=document.getElementById('fecha').value;
 if(!t) return alert('Falta título');
 let obj={t,d,f};
 if(tipo==='curso') cursos.push(obj);
 if(tipo==='tarea') tareas.push(obj);
 if(tipo==='examen') examenes.push(obj);
 guardar(); render();
}

function render(){
 document.getElementById('listaCursos').innerHTML=cursos.map(c=>`<div class='card'>${c.t}</div>`).join('');

 document.getElementById('listaTareas').innerHTML=tareas.map((t,i)=>{
 let expirada = t.f && new Date()>new Date(t.f);
 if(user.rol==='estudiante'){
 return `<div class='card'>${t.t} <br> Fecha: ${t.f||'sin fecha'} ${expirada?'❌ Cerrada':''}
 <textarea id='t${i}'></textarea>
 <input type='file' id='f${i}'>
 <button onclick='enviarTarea(${i})'>Enviar</button></div>`;
 }
 return `<div class='card'>${t.t}</div>`;
 }).join('');

 document.getElementById('listaExamenes').innerHTML=examenes.map((e,i)=>{
 if(user.rol==='estudiante'){
 return `<div class='card'>${e.t}<p>${e.d}</p>
 <textarea id='e${i}'></textarea>
 <button onclick='enviarExamen(${i})'>Responder</button></div>`;
 }
 return `<div class='card'>${e.t}</div>`;
 }).join('');

 if(user.rol==='docente'){
 document.getElementById('listaEntregas').innerHTML=entregas.map((x,i)=>
 `<div class='card'>${x.user} - ${x.tipo}<br>${x.r}
 <input id='n${i}' placeholder='Nota'>
 <button onclick='calificar(${i})'>Guardar Nota</button></div>`).join('');
 }
}

function enviarTarea(i){
 let r=document.getElementById('t'+i).value;
 entregas.push({tipo:'tarea',user:user.nombre,r});
 guardar(); alert('Enviado');
}

function enviarExamen(i){
 let r=document.getElementById('e'+i).value;
 entregas.push({tipo:'examen',user:user.nombre,r});
 guardar(); alert('Enviado');
}

function calificar(i){
 let n=document.getElementById('n'+i).value;
 entregas[i].nota=n;
 guardar(); alert('Calificado');
}

function guardar(){
 localStorage.setItem('cursos',JSON.stringify(cursos));
 localStorage.setItem('tareas',JSON.stringify(tareas));
 localStorage.setItem('examenes',JSON.stringify(examenes));
 localStorage.setItem('entregas',JSON.stringify(entregas));
}

if(user) iniciar();
</script>

</body>
</html>
