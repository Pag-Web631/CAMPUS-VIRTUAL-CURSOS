<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual UTECO</title>

<style>
:root {
    --primary: #1a73e8;
    --bg: #f4f6f8;
    --white: #ffffff;
    --text: #333;
    --shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.dark {
    --bg: #121212;
    --white: #1e1e1e;
    --text: #f1f1f1;
}

body {
    margin:0;
    font-family: 'Segoe UI', Arial;
    background: var(--bg);
    color: var(--text);
}

header {
    background: linear-gradient(135deg, #1a73e8, #4a90e2);
    color:white;
    padding:20px;
}

.container { display:flex; }

.sidebar {
    width:250px;
    background:var(--white);
    padding:20px;
    min-height:100vh;
}
header {
    background: url('https://st2.depositphotos.com/15832594/42617/i/450/depositphotos_426173910-stock-photo-empty-space-studio-dark-room.jpg') center/cover no-repeat;
    color: white;
    padding: 40px 20px;
    position: relative;
}

/* 🔥 capa oscura para que se vea el texto */
header::before {
    content: "";
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
}

/* 🔥 asegurar que el texto esté encima */
header h2, header p {
    position: relative;
    z-index: 1;
}
.sidebar a {
    display:block;
    padding:10px;
    margin-bottom:5px;
    border-radius:8px;
    text-decoration:none;
    color:var(--text);
}

.sidebar a:hover,
.sidebar a.active {
    background:var(--primary);
    color:white;
}

.main {
    flex:1;
    padding:20px;
}

.cursos {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.curso-card {
    background:var(--white);
    padding:15px;
    border-radius:12px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    border-left:6px solid var(--primary);
}

.color1 { border-left-color:#1a73e8; }
.color2 { border-left-color:#34a853; }
.color3 { border-left-color:#fbbc05; }
.color4 { border-left-color:#ea4335; }
.color5 { border-left-color:#9c27b0; }

.curso-titulo { font-weight:bold; }
.curso-profesor { font-size:14px; color:gray; }

.progreso {
    background:#ddd;
    height:8px;
    border-radius:10px;
    margin:10px 0;
}

.barra {
    height:100%;
    background:var(--primary);
}

.btn {
    background:var(--primary);
    color:white;
    padding:8px;
    border-radius:8px;
    text-align:center;
    text-decoration:none;
}

footer {
    text-align:center;
    padding:20px;
    font-size:12px;
}

@media(max-width:768px){
    .container { flex-direction:column; }
    .sidebar { width:100%; min-height:auto; }
}
</style>
</head>

<body>

<header>
<h2>Campus Virtual UTECO</h2>
<p>JOSE AUGUSTO HERRERA CASTILLO</p>
</header>

<div class="container">

<div class="sidebar">
<h3>Menú</h3>
<a href="index.html" class="active">🏠 Inicio</a>
<a href="curso.html">📚 Cursos</a>
<a href="#">👤 Área personal</a>
<a href="#">📅 Eventos</a>
</div>

<div class="main">

<h2>Mis cursos</h2>

<!-- 🔥 AQUÍ SE CARGAN LOS CURSOS -->
<div class="cursos" id="listaCursos"></div>

</div>
</div>

<footer>
© 2016 Derechos Reservados UTECO <br>
Teléfono: +1 809-585-2291 <br>
Correo: informacion@uteco.edu.do <br>
Dirección: Cotuí, República Dominicana
</footer>

<script>

// 🔥 OBTENER CURSOS GUARDADOS
let cursos = JSON.parse(localStorage.getItem("cursos")) || [];

// 🎨 COLORES
let colores = ["color1","color2","color3","color4","color5"];

let html = "";

cursos.forEach((c,i)=>{

let progreso = Math.floor(Math.random()*100);

html += `
<div class="curso-card ${colores[i % colores.length]}">

<div>
<div class="curso-titulo">${c.titulo}</div>
<div class="curso-profesor">Profesor: ${c.profesor}</div>

<div class="progreso">
<div class="barra" style="width:${progreso}%"></div>
</div>
</div>

<a href="curso.html" class="btn">Entrar al curso</a>

</div>
`;

});

// SI NO HAY CURSOS
if(cursos.length===0){
html = "<p>No tienes cursos creados todavía</p>";
}

document.getElementById("listaCursos").innerHTML = html;

</script>

</body>
</html>
