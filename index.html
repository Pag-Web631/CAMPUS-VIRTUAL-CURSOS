<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual</title>

<link rel="stylesheet" href="login.css">
</head>

<body>

<!-- PANEL INFO -->
<div id="infoPanel">
    <div class="info left">
        <h2>📘 Acerca de la Plataforma</h2>
        <p>Plataforma educativa moderna para gestionar cursos y tareas.</p>
        <ul>
            <li>✔ Cursos</li>
            <li>✔ Tareas</li>
            <li>✔ Calificaciones</li>
        </ul>
    </div>

    <div class="info right">
        <h2>👤 Sobre mí</h2>
        <p><strong>José Augusto Herrera Castillo</strong></p>
        <ul>
            <li>💻 Web</li>
            <li>📱 Apps</li>
            <li>🎮 Juegos</li>
        </ul>
    </div>
</div>

<!-- LOGIN -->
<div class="container">
    <div class="flip-card" id="flipCard">
        <div class="flip-card-inner">

            <!-- LOGIN -->
            <div class="flip-card-front">
                <h2>Campus Virtual</h2>

                <button class="info-btn infoToggle">ℹ️ Información</button>

                <input id="loginUser" placeholder="Usuario">
                <input type="password" id="loginPass" placeholder="Contraseña">

                <button id="btnLogin">Ingresar</button>

                <span id="registerText" class="toggle-text">Registrarse</span>
            </div>

            <!-- REGISTRO -->
            <div class="flip-card-back">
                <h2>Crear Cuenta</h2>

                <button class="info-btn infoToggle">ℹ️ Información</button>

                <input id="regUser" placeholder="Usuario">
                <input type="password" id="regPass" placeholder="Contraseña">

                <select id="regRol">
                    <option value="">Selecciona Rol</option>
                    <option value="estudiante">Estudiante</option>
                    <option value="docente">Docente</option>
                </select>

                <button id="btnRegistrar">Registrar</button>

                <span id="loginText" class="toggle-text">Volver</span>
            </div>

        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
