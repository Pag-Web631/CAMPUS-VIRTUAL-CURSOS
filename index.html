<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual UTECO - Login</title>
<style>
body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f4f6f8; }
.login-box { background:white; padding:20px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.2); width:300px; text-align:center; }
input { width:90%; padding:8px; margin:5px 0; }
button { width:95%; padding:10px; margin:5px 0; border:none; border-radius:5px; background:#1a73e8; color:white; cursor:pointer; }
</style>
</head>
<body>

<div class="login-box">
  <h2>Campus Virtual UTECO</h2>
  <input id="nombre" placeholder="Tu nombre">
  <button onclick="login('estudiante')">👨‍🎓 Estudiante</button>
  <button onclick="login('docente')">👨‍🏫 Docente</button>
</div>

<script>
function login(rol){
  let nombre = document.getElementById("nombre").value.trim();
  if(!nombre) { alert("Ingresa tu nombre"); return; }
  // Guardar en localStorage
  localStorage.setItem("user", JSON.stringify({nombre, rol}));
  // Redirigir según rol
  if(rol==="estudiante") window.location.href = "estudiante.html";
  else window.location.href = "docente.html";
}
</script>

</body>
</html>
