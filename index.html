<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual PRO MAX+</title>
<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#1a73e8; color:white; padding:15px; text-align:center; }
nav { display:flex; gap:10px; justify-content:center; background:#fff; padding:10px; flex-wrap:wrap; }
nav button { padding:10px; border:none; cursor:pointer; background:#eee; }
section { display:none; padding:20px; }
.active { display:block; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
input, textarea { width:100%; padding:8px; margin:5px 0; }
button.primary { background:#1a73e8; color:white; }
.badge { padding:5px 10px; border-radius:5px; font-size:12px; }
.ok { background:#d4edda; }
.warn { background:#fff3cd; }
</style>
</head>
<body>

<header>
<h1>🎓 Campus Virtual PRO MAX+</h1>
</header>

<section id="login" class="active">
<h2>Login</h2>
<select id="rol">
<option value="docente">Docente</option>
<option value="estudiante">Estudiante</option>
</select>
<input id="usuario" placeholder="Nombre">
<button onclick="login()">Entrar</button>
</section>

<nav id="menu" style="display:none">
<button onclick="mostrar('tareas')">Tareas</button>
<button onclick="mostrar('crear')" id="btnCrear">Crear</button>
<button onclick="mostrar('entregas')">Entregas</button>
<button onclick="logout()">Salir</button>
</nav>

<section id="crear">
<h2>Crear Tarea Completa</h2>
<input id="titulo" placeholder="Título (Ej: LogLine - Línea Guía)">
<textarea id="descripcion" placeholder="Descripción completa"></textarea>
<input type="date" id="fecha">
<button onclick="crearTarea()">Publicar</button>
</section>

<section id="tareas">
<h2>Tareas</h2>
<div id="listaTareas"></div>
</section>

<section id="entregas">
<h2>Entregas</h2>
<div id="listaEntregas"></div>
</section>

<script>
let user = JSON.parse(localStorage.getItem('user'));
let tareas = JSON.parse(localStorage.getItem('tareas'))||[];
let entregas = JSON.parse(localStorage.getItem('entregas'))||[];

function login(){
 let rol=document.getElementById('rol').value;
 let nombre=document.getElementById('usuario').value;
 if(!nombre) return alert('Escribe nombre');
 user={rol,nombre};
 localStorage.setItem('user',JSON.stringify(user));
 iniciar();
}

function iniciar(){
 document.getElementById('login').style.display='none';
 document.getElementById('menu').style.display='flex';
 if(user.rol==='estudiante') document.getElementById('btnCrear').style.display='none';
 mostrar('tareas');
 render();
}

function logout(){localStorage.clear();location.reload();}

function mostrar(id){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function crearTarea(){
 let t=document.getElementById('titulo').value;
 let d=document.getElementById('descripcion').value;
 let f=document.getElementById('fecha').value;
 tareas.push({t,d,f});
 guardar(); render();
}

function render(){
 document.getElementById('listaTareas').innerHTML=tareas.map((t,i)=>{
 let fechaLimite=new Date(t.f);
 let ahora=new Date();
 let entregado=entregas.find(e=>e.user===user.nombre && e.index===i);

 if(user.rol==='estudiante'){
 return `<div class='card'>
 <h3>${t.t}</h3>
 <p>${t.d}</p>
 <p><b>Apertura:</b> ${t.f}</p>
 <p><b>Cierre:</b> ${t.f}</p>
 
 <p><b>Estado:</b> ${entregado?'<span class="badge ok">Enviado</span>':'<span class="badge warn">Pendiente</span>'}</p>
 
 <textarea id='resp${i}' placeholder='Escribe o describe tu archivo'></textarea>
 <input type='file' id='file${i}'>
 <button onclick='enviar(${i})'>Subir tarea</button>
 </div>`;
 }
 
 return `<div class='card'>
 <h3>${t.t}</h3>
 <p>${t.d}</p>
 </div>`;
 }).join('');

 if(user.rol==='docente'){
 document.getElementById('listaEntregas').innerHTML=entregas.map((e,i)=>`<div class='card'>
 <b>${e.user}</b><br>
 ${e.r}<br>
 Archivo: ${e.file||'Ninguno'}<br>
 Estado: ${e.nota? 'Calificado: '+e.nota : 'Sin calificar'}<br>
 <input id='nota${i}' placeholder='Nota'>
 <button onclick='calificar(${i})'>Calificar</button>
 </div>`).join('');
 }
}

function enviar(i){
 let r=document.getElementById('resp'+i).value;
 let file=document.getElementById('file'+i).files[0];
 entregas.push({user:user.nombre,index:i,r,file:file?file.name:''});
 guardar(); render(); alert('Tarea enviada');
}

function calificar(i){
 let n=document.getElementById('nota'+i).value;
 entregas[i].nota=n;
 guardar(); render();
}

function guardar(){
 localStorage.setItem('tareas',JSON.stringify(tareas));
 localStorage.setItem('entregas',JSON.stringify(entregas));
}

if(user) iniciar();
</script>

</body>
</html>
