<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual UTECO</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Iniciar Sesión</h2>

        <input id="nombre" placeholder="Usuario">

        <button onclick="login('estudiante')">👨‍🎓 Estudiante</button>
        <button onclick="login('docente')">👨‍🏫 Docente</button>
    </div>
</div>

<script>
function login(rol){
    let nombre = document.getElementById("nombre").value.trim();
    if(!nombre) return alert("Ingresa tu nombre");

    localStorage.setItem("usuario", JSON.stringify({nombre, rol}));

    if(rol === "docente") window.location.href = "docente.html";
    else window.location.href = "estudiante.html";
}
</script>

</body>
</html>
