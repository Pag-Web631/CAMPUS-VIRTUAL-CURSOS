<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual UTECO</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#f4f6f8; }
header {
    background: linear-gradient(135deg,#1a73e8,#4a90e2);
    color:white;
    padding:10px 20px;
    position: sticky;
    top:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    z-index:1000;
}

/* Logo + titulo */
.header-left {
    display:flex;
    align-items:center;
    gap:15px;
}
header h2 { margin:0; font-size:1.2em; }

/* Menu + botones */
.header-right {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}
header input { padding:5px; border-radius:5px; border:none; }
header button { padding:5px 10px; border:none; border-radius:5px; cursor:pointer; }

/* Panel debajo */
.main { padding:20px; }
.panel {
    background:white; 
    padding:20px; 
    border-radius:10px; 
    box-shadow:0 4px 15px rgba(0,0,0,0.1); 
    max-width:800px;
    margin:auto;
}
</style>
</head>
<body>

<header>
    <div class="header-left">
        <h2>Campus Virtual UTECO</h2>
        <p id="bienvenida">Bienvenido</p>
    </div>
    <div class="header-right">
        <input id="nombre" placeholder="Tu nombre">
        <button onclick="login('estudiante')">👨‍🎓 Estudiante</button>
        <button onclick="login('docente')">👨‍🏫 Docente</button>
    </div>
</header>

<div class="main">
    <div class="panel" id="panel">
        <p>Selecciona tu rol arriba para acceder al panel.</p>
    </div>
</div>

<script>
function login(rol){
    let nombre = document.getElementById("nombre").value.trim();
    if(!nombre) { alert("Ingresa tu nombre"); return; }
    localStorage.setItem("user", JSON.stringify({nombre, rol}));
    actualizarHeader();
    renderPanel();
}

function actualizarHeader(){
    let user = JSON.parse(localStorage.getItem("user"));
    if(user){
        document.getElementById("bienvenida").innerText = `Bienvenido ${user.nombre} (${user.rol === 'estudiante' ? 'Estudiante' : 'Docente'})`;
    }
}

function renderPanel(){
    let user = JSON.parse(localStorage.getItem("user"));
    let panel = document.getElementById("panel");
    if(!user){
        panel.innerHTML = "<p>Selecciona tu rol arriba para acceder al panel.</p>";
        return;
    }
    if(user.rol === "estudiante"){
        panel.innerHTML = "<h3>Panel Estudiante</h3><p>Ver cursos, ver tareas y enviar entregas.</p>";
    } else {
        panel.innerHTML = "<h3>Panel Docente</h3><p>Crear cursos, crear tareas, ver entregas y calificar.</p>";
    }
}

// Al cargar la página
actualizarHeader();
renderPanel();
</script>

</body>
</html>
