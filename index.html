<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Virtual Pro+</title>
<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#1a73e8; color:white; padding:15px; text-align:center; }
nav { display:flex; gap:10px; justify-content:center; background:#fff; padding:10px; }
nav button { padding:10px; border:none; cursor:pointer; background:#eee; }
section { display:none; padding:20px; }
.active { display:block; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
input, textarea, select { width:100%; padding:8px; margin:5px 0; }
button.primary { background:#1a73e8; color:white; }
</style>
</head>
<body>

<header>
<h1>🎓 Campus Virtual PRO+</h1>
</header>

<section id="login" class="active">
<h2>Iniciar Sesión</h2>
<select id="rol">
<option value="docente">Docente</option>
<option value="estudiante">Estudiante</option>
</select>
<input id="usuario" placeholder="Nombre">
<button class="primary" onclick="login()">Entrar</button>
</section>

<nav id="menu" style="display:none">
<button onclick="mostrar('cursos')">Cursos</button>
<button onclick="mostrar('crear')" id="btnCrear">Crear</button>
<button onclick="mostrar('tareas')">Tareas</button>
<button onclick="mostrar('examenes')">Exámenes</button>
<button onclick="logout()">Salir</button>
</nav>

<section id="cursos">
<h2>Cursos</h2>
<div id="listaCursos"></div>
</section>

<section id="crear">
<h2>Crear (Docente)</h2>
<select id="tipoCrear">
<option value="curso">Curso</option>
<option value="tarea">Tarea</option>
<option value="examen">Examen</option>
</select>
<input id="titulo" placeholder="Título">
<textarea id="descripcion" placeholder="Descripción o preguntas"></textarea>
<button class="primary" onclick="crear()">Guardar</button>
</section>

<section id="tareas">
<h2>Tareas</h2>
<div id="listaTareas"></div>
</section>

<section id="examenes">
<h2>Exámenes</h2>
<div id="listaExamenes"></div>
</section>

<script>
let usuarioActual = JSON.parse(localStorage.getItem('usuarioActual')) || null;
let cursos = JSON.parse(localStorage.getItem('cursos')) || [];
let tareas = JSON.parse(localStorage.getItem('tareas')) || [];
let examenes = JSON.parse(localStorage.getItem('examenes')) || [];
let respuestas = JSON.parse(localStorage.getItem('respuestas')) || [];

function login(){
 let rol = document.getElementById('rol').value;
 let nombre = document.getElementById('usuario').value;
 if(!nombre) return alert('Escribe tu nombre');
 usuarioActual = {rol, nombre};
 localStorage.setItem('usuarioActual', JSON.stringify(usuarioActual));
 iniciarApp();
}

function iniciarApp(){
 document.getElementById('login').style.display='none';
 document.getElementById('menu').style.display='flex';
 mostrar('cursos');
 if(usuarioActual.rol === 'estudiante'){
 document.getElementById('btnCrear').style.display='none';
 }
 mostrarTodo();
}

function logout(){ localStorage.removeItem('usuarioActual'); location.reload(); }

function mostrar(id){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function crear(){
 if(usuarioActual.rol !== 'docente') return alert('Solo docente');
 let tipo = document.getElementById('tipoCrear').value;
 let titulo = document.getElementById('titulo').value;
 let desc = document.getElementById('descripcion').value;
 if(!titulo) return alert('Falta título');

 if(tipo==='curso') cursos.push({titulo, desc});
 if(tipo==='tarea') tareas.push({titulo, desc});
 if(tipo==='examen') examenes.push({titulo, desc});

 guardar();
 mostrarTodo();
}

function guardar(){
 localStorage.setItem('cursos', JSON.stringify(cursos));
 localStorage.setItem('tareas', JSON.stringify(tareas));
 localStorage.setItem('examenes', JSON.stringify(examenes));
 localStorage.setItem('respuestas', JSON.stringify(respuestas));
}

function mostrarTodo(){
 document.getElementById('listaCursos').innerHTML = cursos.map(c=>`<div class='card'>${c.titulo}</div>`).join('');

 document.getElementById('listaTareas').innerHTML = tareas.map((t,i)=>{
 if(usuarioActual.rol==='estudiante'){
 return `<div class='card'>${t.titulo}
 <textarea id='respT${i}' placeholder='Subir respuesta'></textarea>
 <button onclick='enviarTarea(${i})'>Enviar</button></div>`;
 } else return `<div class='card'>${t.titulo}</div>`;
 }).join('');

 document.getElementById('listaExamenes').innerHTML = examenes.map((e,i)=>{
 if(usuarioActual.rol==='estudiante'){
 return `<div class='card'>${e.titulo}
 <p>${e.desc}</p>
 <textarea id='respE${i}' placeholder='Responder examen'></textarea>
 <button onclick='enviarExamen(${i})'>Enviar</button></div>`;
 } else return `<div class='card'>${e.titulo}</div>`;
 }).join('');
}

function enviarTarea(i){
 let r = document.getElementById('respT'+i).value;
 respuestas.push({tipo:'tarea', index:i, user:usuarioActual.nombre, r});
 guardar(); alert('Tarea enviada');
}

function enviarExamen(i){
 let r = document.getElementById('respE'+i).value;
 respuestas.push({tipo:'examen', index:i, user:usuarioActual.nombre, r});
 guardar(); alert('Examen enviado');
}

if(usuarioActual) iniciarApp();
</script>

</body>
</html>
