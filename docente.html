<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente</title>
</head>

<body>

<h2>Panel Docente</h2>

<p>Aquí podrás:</p>
<ul>
    <li>Crear cursos</li>
    <li>Asignar tareas</li>
    <li>Calificar estudiantes</li>
</ul>

<!-- 🔥 AQUI VA -->
<script>
const session = JSON.parse(localStorage.getItem("session"));

if(!session){
    alert("Debes iniciar sesión");
    location.href = "index.html";
}

// SOLO DOCENTE
if(session.rol !== "docente"){
    alert("Acceso solo para docentes ❌");
    location.href = "index.html";
}

// Mostrar nombre
document.body.innerHTML += "<h3>Bienvenido docente: " + session.user + "</h3>";
</script>

</body>
</html>
