<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudiante - Campus Virtual</title>
<style>
.main { max-width:1200px; margin:auto; padding:20px; }
.cursos { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px; }
.curso-card { padding:15px; border-left:6px solid #34a853; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.08);}
button { cursor:pointer; padding:6px 12px; border:none; border-radius:5px; background:#34a853; color:white; margin:3px;}
</style>
</head>
<body>

<div id="header-container"></div>

<div class="main">
<h2>Panel Estudiante</h2>
<div class="cursos" id="listaCursos"></div>
</div>

<script>
// Cargar header
fetch('header.html').then(res=>res.text()).then(data=>document.getElementById("header-container").innerHTML=data);

// Verificar rol
let user = JSON.parse(localStorage.getItem("user")) || {nombre:"", rol:""};
if(user.rol!=="estudiante") { alert("No tienes permisos de estudiante"); window.location="index.html"; }

let cursos = JSON.parse(localStorage.getItem("cursos")) || [];
function renderCursos(){
    let html="";
    cursos.forEach((c,i)=>{
        let tareas = JSON.parse(localStorage.getItem("tareas_"+i)) || [];
        html += `<div class="curso-card">
            <b>${c.titulo}</b> - Profesor: ${c.profesor}<br>
            <div>Tareas: ${tareas.length}</div>
            ${tareas.map((t,j)=>`<div>${t.titulo} <button onclick="entregar(${i},${j})">Enviar</button></div>`).join("")}
        </div>`;
    });
    if(cursos.length===0) html="<p>No tienes cursos asignados</p>";
    document.getElementById("listaCursos").innerHTML = html;
}
renderCursos();

function entregar(cursoIndex, tareaIndex){
    let file = prompt("Nombre del archivo a enviar");
    if(!file) return;
    let tareas = JSON.parse(localStorage.getItem("tareas_"+cursoIndex)) || [];
    if(!tareas[tareaIndex].entregas) tareas[tareaIndex].entregas = [];
    tareas[tareaIndex].entregas.push({user:user.nombre, file, nota:null});
    localStorage.setItem("tareas_"+cursoIndex, JSON.stringify(tareas));
    alert("Tarea enviada");
    renderCursos();
}
</script>
</body>
</html>
