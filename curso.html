<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curso - Comercio Electrónico</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#1a73e8; color:white; padding:15px; }
.container { display:flex; }
.sidebar { width:220px; background:white; padding:15px; height:100vh; }
.main { flex:1; padding:20px; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:10px; }
.item { background:#f1f3f4; padding:10px; margin:5px 0; border-radius:5px; }
button { padding:8px; background:#1a73e8; color:white; border:none; border-radius:5px; }
input, textarea { width:100%; padding:8px; margin:5px 0; }
table td { padding:6px; }
</style>

</head>
<body>

<header>
<h2>IRI-119-01 - Comercio Electrónico</h2>
</header>

<div class="container">

<div class="sidebar">

<h3>Usuario</h3>
<input id="nombre" placeholder="Tu nombre">
<button onclick="guardarUser()">Entrar</button>

<hr>

<button onclick="modo='estudiante'; render()">👨‍🎓 Estudiante</button>
<button onclick="modo='docente'; render()">👨‍🏫 Docente</button>

</div>

<div class="main" id="contenido"></div>

</div>

<script>

let modo = "estudiante";
let user = localStorage.getItem("user") || "";

let tareas = JSON.parse(localStorage.getItem("tareas")) || [];
let entregas = JSON.parse(localStorage.getItem("entregas")) || [];

function guardarUser(){
    user = document.getElementById("nombre").value.trim();
    if(!user) return alert("Escribe tu nombre");
    localStorage.setItem("user", user);
    render();
}

// 🔄 RENDER
function render(){

let html = "<h2>Tareas del curso</h2>";

if(modo==="docente"){
html += `
<div class="card">
<h3>Crear tarea</h3>
<input id="t" placeholder="Título tarea">
<button onclick="crear()">Crear</button>
</div>
`;
}

// LISTA
tareas.forEach((t,i)=>{

let entrega = entregas.find(e=>e.user===user && e.tarea===i);

html += `<div class="card"><b>${t}</b><br><br>`;

// ================= ESTUDIANTE =================
if(modo==="estudiante"){

html += `
<b>Actividad #${i+1}</b><br>
Requisitos de finalización<br><br>

Apertura: 11 de marzo de 2026<br>
Cierre: 15 de marzo de 2026<br><br>

📄 Archivo de la actividad<br><br>

<h4>Estado de la entrega</h4>

<table width="100%">
<tr>
<td><b>Estado de la entrega</b></td>
<td>${entrega?"Enviado para calificar":"Todavía no se han realizado envíos"}</td>
</tr>

<tr>
<td><b>Estado de la calificación</b></td>
<td>${entrega?.nota?"Calificado":"Sin calificar"}</td>
</tr>

<tr>
<td><b>Última modificación</b></td>
<td>${entrega?entrega.fecha:"-"}</td>
</tr>

<tr>
<td><b>Archivos enviados</b></td>
<td>${entrega?.file || "-"}</td>
</tr>

<tr>
<td><b>Comentarios</b></td>
<td>${entrega?.comentario || "Comentarios (0)"}</td>
</tr>

<tr>
<td><b>Calificación</b></td>
<td>${entrega?.nota ? entrega.nota+" / 5.00" : "-"}</td>
</tr>
</table>

<br>

<input type="file" id="f${i}">
<textarea id="r${i}" placeholder="Respuesta"></textarea>

<button onclick="enviar(${i})">
${entrega ? "Actualizar entrega" : "Enviar tarea"}
</button>
`;
}

// ================= DOCENTE =================
if(modo==="docente"){

let lista = entregas
.map((e,idx)=>({ ...e, idx }))
.filter(e=>e.tarea===i);

html += "<h4>Entregas:</h4>";

if(lista.length===0){
html += "<p>No hay entregas</p>";
}

lista.forEach(e=>{
html += `
<div class="item">
<b>${e.user}</b><br>
Archivo: ${e.file || "No subido"}<br>
Estado: ${e.nota?"Calificado":"Sin calificar"}<br>

<input id="nota${e.idx}" placeholder="Nota">
<textarea id="com${e.idx}" placeholder="Comentario"></textarea>

<button onclick="calificar(${e.idx})">Guardar</button>
</div>
`;
});
}

html += "</div>";
});

document.getElementById("contenido").innerHTML = html;
}

// CREAR
function crear(){
let t = document.getElementById("t").value;
if(!t) return alert("Escribe título");
tareas.push(t);
localStorage.setItem("tareas", JSON.stringify(tareas));
render();
}

// ENVIAR (sin duplicar)
function enviar(i){

if(!user) return alert("Ingresa tu nombre");

let file = document.getElementById("f"+i).files[0];

let index = entregas.findIndex(e=>e.user===user && e.tarea===i);

let data = {
user:user,
tarea:i,
file:file?file.name:"",
fecha:new Date().toLocaleString(),
nota:null,
comentario:null
};

if(index >= 0){
entregas[index] = data; // actualizar
}else{
entregas.push(data); // nuevo
}

localStorage.setItem("entregas", JSON.stringify(entregas));
render();
}

// CALIFICAR
function calificar(i){

entregas[i].nota = document.getElementById("nota"+i).value;
entregas[i].comentario = document.getElementById("com"+i).value;

localStorage.setItem("entregas", JSON.stringify(entregas));
render();
}

render();

</script>

</body>
</html>
