<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#1a73e8; color:white; padding:15px; }
.main { padding:20px; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:10px; }
input, textarea { width:100%; padding:10px; margin:5px 0; }
button { padding:10px; background:#1a73e8; color:white; border:none; }
.item { background:#f1f3f4; padding:8px; margin:5px 0; border-radius:5px; }
</style>

</head>
<body>

<header>
<h2 id="tituloCurso">Curso</h2>
<a href="index.html" style="color:white;">⬅ Volver</a>
</header>

<div class="main">

<!-- CREAR CONTENIDO -->
<div class="card">
<h3>Crear contenido (Docente)</h3>

<input id="titulo" placeholder="Ej: UNIDAD I, Fundamentos...">
<textarea id="desc" placeholder="Descripción o contenido"></textarea>

<button onclick="agregar()">Agregar</button>
</div>

<!-- MOSTRAR CONTENIDO -->
<div class="card">
<h3>Contenido del curso</h3>
<div id="contenido"></div>
</div>

</div>

<script>
let curso = "IRI-119-01 - Comercio Electrónico";
document.getElementById("tituloCurso").innerText = curso;

// cargar datos
let datos = JSON.parse(localStorage.getItem(curso)) || [];

function agregar(){
    let t = document.getElementById("titulo").value;
    let d = document.getElementById("desc").value;

    if(!t) return alert("Escribe un título");

    datos.push({t,d});
    localStorage.setItem(curso, JSON.stringify(datos));

    mostrar();
}

function mostrar(){
    let cont = document.getElementById("contenido");
    cont.innerHTML = "";

    datos.forEach(x=>{
        cont.innerHTML += `
        <div class="item">
        <b>${x.t}</b><br>
        ${x.d}
        </div>`;
    });
}

mostrar();
</script>

</body>
</html>
