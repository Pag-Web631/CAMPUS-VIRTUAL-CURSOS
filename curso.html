
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curso - Comercio Electrónico</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }

header {
background:#1a73e8;
color:white;
padding:15px;
}

/* CONTENEDOR PRINCIPAL */
.container {
display:flex;
}

/* MENÚ (NO TOCADO) */
.sidebar {
width:250px;
background:white;
padding:20px;
height:100vh;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.sidebar a {
display:flex;
gap:10px;
padding:12px;
text-decoration:none;
color:#333;
border-radius:8px;
margin-bottom:5px;
}

.sidebar a:hover,
.sidebar a.active {
background:#1a73e8;
color:white;
}

/* CONTENIDO */
.main {
flex:1;
padding:20px;
}

/* TARJETAS */
.card {
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.item {
background:#f1f3f4;
padding:10px;
margin:5px 0;
border-radius:5px;
}

/* BOTONES */
button {
padding:8px;
background:#1a73e8;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin:3px;
}

/* INPUT */
input, textarea {
width:100%;
padding:8px;
margin:5px 0;
}
</style>

</head>

<body>

<header>
<h2>Campus Virtual UTECO</h2>
<p>JOSE AUGUSTO HERRERA CASTILLO</p>
</header>

<div class="container">

<!-- 🔵 MENÚ ORIGINAL (NO TOCADO) -->
<div class="sidebar">
<h3>Menú</h3>

<a href="index.html">🏠 Inicio</a>
<a href="#" class="active">📚 Cursos</a>
<a href="#">👤 Área personal</a>
<a href="#">📅 Eventos</a>

<hr>

<button onclick="modo='estudiante'; render()">👨‍🎓 Estudiante</button>
<button onclick="modo='docente'; render()">👨‍🏫 Docente</button>

<input id="nombre" placeholder="Tu nombre">
<button onclick="guardarUser()">Guardar</button>

<button onclick="volver()">⬅ Volver</button>

</div>

<!-- 🔵 CONTENIDO -->
<div class="main" id="contenido"></div>

</div>

<script>

let modo = "estudiante";
let user = localStorage.getItem("user") || "";

let cursos = JSON.parse(localStorage.getItem("cursos")) || [];
let cursoActual = null;

// ================= USER =================
function guardarUser(){
user = document.getElementById("nombre").value;
localStorage.setItem("user", user);
render();
}

// ================= RENDER =================
function render(){

let html = "";

// ================= CURSOS =================
if(cursoActual===null){

html += "<h2>Mis cursos</h2>";

if(modo==="docente"){
html += `
<div class="card">
<h3>Crear curso</h3>
<input id="ct" placeholder="Nombre curso">
<input id="cp" placeholder="Profesor">
<button onclick="crearCurso()">Crear</button>
</div>
`;
}

cursos.forEach((c,i)=>{
html += `
<div class="card">
<b>${c.titulo}</b><br>
Profesor: ${c.profesor}<br><br>

<button onclick="abrirCurso(${i})">Entrar</button>

${modo==="docente"?`
<button onclick="editarCurso(${i})">✏️</button>
<button onclick="eliminarCurso(${i})">🗑️</button>
`:""}

</div>
`;
});

}

// ================= DENTRO DEL CURSO =================
else{

let curso = cursos[cursoActual];

let tareas = JSON.parse(localStorage.getItem("tareas_"+cursoActual)) || [];
let entregas = JSON.parse(localStorage.getItem("entregas_"+cursoActual)) || [];

html += `<h2>${curso.titulo}</h2>`;

// DOCENTE CREA TAREA
if(modo==="docente"){
html += `
<div class="card">
<h3>Crear tarea</h3>
<input id="t" placeholder="Actividad">
<input type="datetime-local" id="apertura">
<input type="datetime-local" id="cierre">
<button onclick="crearTarea()">Crear</button>
</div>
`;
}

// LISTA TAREAS
tareas.forEach((t,i)=>{

let entrega = entregas.find(e=>e.user===user && e.tarea===i);

let ahora = new Date();
let disponible = ahora >= new Date(t.apertura);
let vencida = ahora > new Date(t.cierre);

html += `<div class="card">`;

// ESTUDIANTE
if(modo==="estudiante"){
html += `
<b>${t.titulo}</b><br>
Apertura: ${new Date(t.apertura).toLocaleString()}<br>
Cierre: ${new Date(t.cierre).toLocaleString()}<br><br>

Estado: ${entrega?"Enviado":"No enviado"}<br>
Nota: ${entrega?.nota || "-"}<br><br>
`;

if(disponible && !vencida){
html += `
<input type="file" id="f${i}">
<button onclick="enviar(${i})">Enviar</button>
`;
}else{
html += `<p style="color:red;">Cerrado</p>`;
}
}

// DOCENTE
if(modo==="docente"){

let lista = entregas.map((e,idx)=>({...e,idx})).filter(e=>e.tarea===i);

html += `
<b>${t.titulo}</b><br>
<button onclick="eliminarTarea(${i})">🗑️ Eliminar tarea</button>
<h4>Entregas</h4>
`;

if(lista.length===0) html+="No hay entregas";

lista.forEach(e=>{
html += `
<div class="item">
${e.user} - ${e.file}<br>

<input id="nota${e.idx}" placeholder="Nota">
<textarea id="com${e.idx}" placeholder="Comentario"></textarea>

<button onclick="calificar(${e.idx})">Guardar</button>
</div>
`;
});
}

html += "</div>";
});

}

document.getElementById("contenido").innerHTML = html;
}

// ================= CURSOS =================
function crearCurso(){
let t = document.getElementById("ct").value;
let p = document.getElementById("cp").value;

if(!t || !p) return alert("Completa todo");

cursos.push({titulo:t, profesor:p});
localStorage.setItem("cursos", JSON.stringify(cursos));
render();
}

function editarCurso(i){
let t = prompt("Nombre", cursos[i].titulo);
let p = prompt("Profesor", cursos[i].profesor);

if(!t || !p) return;

cursos[i]={titulo:t, profesor:p};
localStorage.setItem("cursos", JSON.stringify(cursos));
render();
}

function eliminarCurso(i){
if(!confirm("Eliminar curso?")) return;

cursos.splice(i,1);
localStorage.setItem("cursos", JSON.stringify(cursos));
render();
}

function abrirCurso(i){
cursoActual = i;
render();
}

function volver(){
cursoActual = null;
render();
}

// ================= TAREAS =================
function crearTarea(){

let tareas = JSON.parse(localStorage.getItem("tareas_"+cursoActual)) || [];

let t = document.getElementById("t").value;
let a = document.getElementById("apertura").value;
let c = document.getElementById("cierre").value;

if(!t || !a || !c) return alert("Completa todo");

tareas.push({titulo:t, apertura:a, cierre:c});

localStorage.setItem("tareas_"+cursoActual, JSON.stringify(tareas));
render();
}

function eliminarTarea(i){

let tareas = JSON.parse(localStorage.getItem("tareas_"+cursoActual)) || [];
let entregas = JSON.parse(localStorage.getItem("entregas_"+cursoActual)) || [];

tareas.splice(i,1);
entregas = entregas.filter(e=>e.tarea!==i);

localStorage.setItem("tareas_"+cursoActual, JSON.stringify(tareas));
localStorage.setItem("entregas_"+cursoActual, JSON.stringify(entregas));

render();
}

// ================= ENTREGAS =================
function enviar(i){

let entregas = JSON.parse(localStorage.getItem("entregas_"+cursoActual)) || [];

let file = document.getElementById("f"+i).files[0];

let index = entregas.findIndex(e=>e.user===user && e.tarea===i);

let data = {
user,
tarea:i,
file:file?file.name:"",
nota:null,
comentario:null
};

if(index>=0) entregas[index]=data;
else entregas.push(data);

localStorage.setItem("entregas_"+cursoActual, JSON.stringify(entregas));
render();
}

function calificar(i){

let entregas = JSON.parse(localStorage.getItem("entregas_"+cursoActual)) || [];

entregas[i].nota = document.getElementById("nota"+i).value;
entregas[i].comentario = document.getElementById("com"+i).value;

localStorage.setItem("entregas_"+cursoActual, JSON.stringify(entregas));
render();
}

render();

</script>

</body>
</html>
