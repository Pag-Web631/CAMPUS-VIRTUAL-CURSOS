<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curso - Comercio Electrónico</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#1a73e8; color:white; padding:15px; }
.container { display:flex; }
.sidebar { width:230px; background:white; padding:15px; height:100vh; }
.main { flex:1; padding:20px; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:10px; }
.item { background:#f1f3f4; padding:10px; margin:5px 0; border-radius:5px; }
button { padding:8px; background:#1a73e8; color:white; border:none; border-radius:5px; cursor:pointer; }
input, textarea { width:100%; padding:8px; margin:5px 0; }
table td { padding:6px; }
    :root {
    --primary: #1a73e8;
    --white: #ffffff;
    --text: #333;
    --shadow: 0 4px 15px rgba(0,0,0,0.08);
}

/* 🌙 MODO OSCURO */
.dark {
    --white: #1e1e1e;
    --text: #f1f1f1;
    --shadow: 0 4px 15px rgba(0,0,0,0.5);
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: var(--white);
    padding: 20px;
    height: 100vh;
    box-shadow: var(--shadow);
    transition: 0.3s;
}

.sidebar h3 {
    margin-top: 0;
    color: var(--primary);
}

/* LINKS DEL MENÚ */
.sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    text-decoration: none;
    color: var(--text);
    border-radius: 8px;
    margin-bottom: 5px;
    transition: 0.3s;
}

/* HOVER EFECTO */
.sidebar a:hover {
    background: var(--primary);
    color: white;
    transform: translateX(5px);
}

/* LINK ACTIVO */
.sidebar a.active {
    background: var(--primary);
    color: white;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar {
        width: 100%;
        height: auto;
    }
}
</style>

</head>
<body>


<header>
<h2>Campus Virtual UTECO</h2>
<p>JOSE AUGUSTO HERRERA CASTILLO</p>
</header>

<div class="container">

<div class="sidebar">
<h3>Menú</h3>

<div class="sidebar">
    <h3>Menú</h3>

    <a href="index.html" class="active">🏠 Inicio</a>
    <a href="#">👤 Área personal</a>
    <a href="#"class="active">📚 Cursos </a>
    <a href="#">📅 Eventos</a>
</div>


</div>
<div class="main">

<div class="container">

<div class="sidebar">

<h3>Usuario</h3>
<input id="nombre" placeholder="Tu nombre">
<button onclick="guardarUser()">Entrar</button>

<hr>

<button onclick="modo='estudiante'; render()">👨‍🎓 Estudiante</button>
<button onclick="modo='docente'; render()">👨‍🏫 Docente</button>

</div>

<div class="main" id="contenido"></div>

</div>

<script>

let modo = "estudiante";
let user = localStorage.getItem("user") || "";

let tareas = JSON.parse(localStorage.getItem("tareas")) || [];
let entregas = JSON.parse(localStorage.getItem("entregas")) || [];

// ================= USER =================
function guardarUser(){
    user = document.getElementById("nombre").value.trim();
    if(!user) return alert("Escribe tu nombre");
    localStorage.setItem("user", user);
    render();
}

// ================= RENDER =================
function render(){

let html = "<h2>Tareas del curso</h2>";

// CREAR
if(modo==="docente"){
html += `
<div class="card">
<h3>Crear actividad</h3>
<input id="t" placeholder="Actividad #1">
<label>Apertura</label>
<input type="datetime-local" id="apertura">
<label>Cierre</label>
<input type="datetime-local" id="cierre">
<button onclick="crear()">Crear</button>
</div>
`;
}

// LISTA
tareas.forEach((t,i)=>{

let entrega = entregas.find(e=>e.user===user && e.tarea===i);

let ahora = new Date();
let apertura = new Date(t.apertura);
let cierre = new Date(t.cierre);

let disponible = ahora >= apertura;
let vencida = ahora > cierre;

html += `<div class="card">`;

// ================= ESTUDIANTE =================
if(modo==="estudiante"){

html += `
<b>${t.titulo}</b><br>
Requisitos de finalización<br><br>

Apertura: ${apertura.toLocaleString()}<br>
Cierre: ${cierre.toLocaleString()}<br><br>

<h4>Estado de la entrega</h4>

<table width="100%">
<tr><td><b>Estado de la entrega</b></td><td>${entrega?"Enviado para calificar":"Todavía no se han realizado envíos"}</td></tr>
<tr><td><b>Estado de la calificación</b></td><td>${entrega?.nota?"Calificado":"Sin calificar"}</td></tr>
<tr><td><b>Tiempo</b></td><td>${!disponible?"No disponible":vencida?"Cerrado":"Disponible"}</td></tr>
<tr><td><b>Última modificación</b></td><td>${entrega?entrega.fecha:"-"}</td></tr>
<tr><td><b>Archivos enviados</b></td><td>${entrega?.file || "-"}</td></tr>
<tr><td><b>Comentarios</b></td><td>${entrega?.comentario || "Comentarios (0)"}</td></tr>
<tr><td><b>Calificación</b></td><td>${entrega?.nota ? entrega.nota+" / 5.00" : "-"}</td></tr>
</table>
<br>
`;

if(disponible && !vencida){
html += `
<input type="file" id="f${i}">
<textarea id="r${i}" placeholder="Respuesta"></textarea>
<button onclick="enviar(${i})">${entrega?"Actualizar":"Enviar"} tarea</button>
`;
}else{
html += `<p style="color:red;">No disponible para enviar</p>`;
}

}

// ================= DOCENTE =================
if(modo==="docente"){

let lista = entregas.map((e,idx)=>({...e,idx})).filter(e=>e.tarea===i);

html += `
<b>${t.titulo}</b><br>
Apertura: ${apertura.toLocaleString()}<br>
Cierre: ${cierre.toLocaleString()}<br><br>

<button onclick="editar(${i})">✏️ Editar</button>
<button onclick="eliminar(${i})">🗑️ Eliminar</button>

<h4>Entregas</h4>
`;

if(lista.length===0){
html += "<p>No hay entregas</p>";
}

lista.forEach(e=>{
html += `
<div class="item">
<b>${e.user}</b><br>
Archivo: ${e.file || "No subido"}<br>
Estado: ${e.nota?"Calificado":"Sin calificar"}<br>

<input id="nota${e.idx}" placeholder="Nota">
<textarea id="com${e.idx}" placeholder="Comentario"></textarea>

<button onclick="calificar(${e.idx})">Guardar</button>
</div>
`;
});
}

html += "</div>";
});

document.getElementById("contenido").innerHTML = html;
}

// ================= CREAR =================
function crear(){
let t = document.getElementById("t").value;
let apertura = document.getElementById("apertura").value;
let cierre = document.getElementById("cierre").value;

if(!t || !apertura || !cierre) return alert("Completa todo");

tareas.push({titulo:t, apertura, cierre});

localStorage.setItem("tareas", JSON.stringify(tareas));
render();
}

// ================= EDITAR =================
function editar(i){

let t = tareas[i];

let titulo = prompt("Título:", t.titulo);
let apertura = prompt("Apertura:", t.apertura);
let cierre = prompt("Cierre:", t.cierre);

if(!titulo || !apertura || !cierre) return;

tareas[i] = {titulo, apertura, cierre};

localStorage.setItem("tareas", JSON.stringify(tareas));
render();
}

// ================= ELIMINAR =================
function eliminar(i){

if(!confirm("Eliminar tarea?")) return;

tareas.splice(i,1);

entregas = entregas.filter(e => e.tarea !== i);
entregas = entregas.map(e => {
if(e.tarea > i) e.tarea--;
return e;
});

localStorage.setItem("tareas", JSON.stringify(tareas));
localStorage.setItem("entregas", JSON.stringify(entregas));

render();
}

// ================= ENVIAR =================
function enviar(i){

if(!user) return alert("Ingresa tu nombre");

let tarea = tareas[i];
let ahora = new Date();

if(ahora < new Date(tarea.apertura)) return alert("No disponible");
if(ahora > new Date(tarea.cierre)) return alert("Actividad cerrada");

let file = document.getElementById("f"+i).files[0];

let index = entregas.findIndex(e=>e.user===user && e.tarea===i);

let data = {
user,
tarea:i,
file:file?file.name:"",
fecha:new Date().toLocaleString(),
nota:null,
comentario:null
};

if(index>=0) entregas[index]=data;
else entregas.push(data);

localStorage.setItem("entregas", JSON.stringify(entregas));
render();
}

// ================= CALIFICAR =================
function calificar(i){

entregas[i].nota = document.getElementById("nota"+i).value;
entregas[i].comentario = document.getElementById("com"+i).value;

localStorage.setItem("entregas", JSON.stringify(entregas));
render();
}

render();

</script>

</body>
</html>
